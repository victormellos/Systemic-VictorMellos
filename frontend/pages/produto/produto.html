<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto — AUTO MAX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="/styles/produto.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="/">AUTO<span class="text-danger">MAX</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Início</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/produtos">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link" href="/ordem-servico">Ordens</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5 mt-5">

        <!-- ── Estado: carregando ───────────────────────────────────────── -->
        <div id="estado-loading" class="text-center py-5">
            <div class="spinner-border text-danger" role="status" style="width:3rem;height:3rem;">
                <span class="visually-hidden">Carregando...</span>
            </div>
            <p class="mt-3 text-dim">Buscando produto...</p>
        </div>

        <!-- ── Estado: erro ─────────────────────────────────────────────── -->
        <div id="estado-erro" class="text-center py-5" hidden>
            <i class="fas fa-exclamation-circle fa-3x mb-3" style="color: var(--red-vivid);"></i>
            <h4 style="color: var(--off-white);">Não foi possível carregar o produto</h4>
            <p id="mensagem-erro" class="text-dim"></p>
            <a href="/produtos" class="btn btn-red mt-2">
                <i class="fas fa-arrow-left me-2"></i> Voltar para produtos
            </a>
        </div>

        <!-- ── Conteúdo do produto ───────────────────────────────────────── -->
        <div id="conteudo-produto" hidden>
            <div class="row g-5 justify-content-center">
                <div class="col-lg-10">
                    <div class="main-card">

                        <!-- Carousel -->
                        <div id="productCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel" data-bs-theme="dark">
                            <div class="carousel-inner">
                                <div class="carousel-item active">
                                    <img
                                        id="produto-imagem-principal"
                                        src=""
                                        class="d-block"
                                        alt=""
                                        onerror="this.src='https://placehold.co/800x600/1E2126/B0B3B8?text=Sem+Imagem'"
                                    >
                                </div>
                            </div>
                            <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Anterior</span>
                            </button>
                            <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Próximo</span>
                            </button>
                        </div>

                        <!-- Informações -->
                        <div class="card-body p-4 p-lg-5">
                            <div class="row">

                                <!-- Coluna esquerda -->
                                <div class="col-lg-7">
                                    <span id="produto-badge" class="badge badge-red mb-3 px-4 py-2 fs-6">EM ESTOQUE</span>
                                    <h1 id="produto-nome" class="display-5 fw-bold mb-2"></h1>
                                    <p id="produto-categoria" class="text-muted mb-4"></p>
                                    <div class="d-flex align-items-baseline gap-3 mb-4">
                                        <span id="produto-preco" class="price"></span>
                                    </div>
                                </div>

                                <!-- Coluna direita — ações -->
                                <div class="col-lg-5 d-flex flex-column justify-content-center">
                                    <div class="d-grid gap-3">
                                        <button id="btn-pedir" class="btn btn-red btn-lg">
                                            <i class="fas fa-cart-plus me-2"></i> Adicionar ao Pedido
                                        </button>
                                        <a href="/produtos" class="btn btn-outline-light btn-lg">
                                            <i class="fas fa-arrow-left me-2"></i> Ver todos os produtos
                                        </a>
                                    </div>
                                </div>
                            </div>

                            <!-- Tabs -->
                            <ul class="nav nav-tabs mt-5" id="infoTabs" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-detalhes">Detalhes</button>
                                </li>
                            </ul>

                            <div class="tab-content pt-4">
                                <div class="tab-pane fade show active" id="tab-detalhes">
                                    <p id="produto-detalhes" style="white-space: pre-wrap;"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Produtos Relacionados -->
            <div class="container py-5 border-top border-secondary mt-4">
                <h3 class="mb-4 text-center" style="color: var(--off-white);">Produtos Relacionados</h3>
                <div id="relacionados-container" class="row g-4"></div>
            </div>
        </div>
        <!-- fim #conteudo-produto -->

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/pages/produto/produto.js"></script>
</body>
</html>
