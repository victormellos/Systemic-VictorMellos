<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoMax — Acesso negado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
           background:#111214; font-family:'Segoe UI',sans-serif; color:#C0C2C7; }
    .box { text-align:center; padding:48px 40px; background:#1C1E22;
           border:1px solid rgba(255,255,255,.07); border-radius:14px; max-width:400px; width:90%; }
    .icon { font-size:48px; color:#FB7185; margin-bottom:16px; }
    .code { font-size:72px; font-weight:700; color:#D72828; line-height:1; margin-bottom:8px; }
    h1   { font-size:18px; font-weight:600; margin-bottom:8px; color:#ECEDEF; }
    p    { font-size:13px; color:#858890; line-height:1.6; margin-bottom:24px; }
    a    { display:inline-flex; align-items:center; gap:6px; padding:10px 20px;
           background:#D72828; color:#fff; border-radius:8px; text-decoration:none;
           font-size:13px; font-weight:500; }
    a:hover { background:#A01E1E; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon"><i class="bi bi-shield-lock"></i></div>
    <div class="code">403</div>
    <h1>Acesso negado</h1>
    <p>Você não tem permissão para acessar esta página.<br>
       Entre em contato com o gerente caso precise de acesso.</p>
    <a href="/ordem-servico"><i class="bi bi-arrow-left"></i>Voltar ao sistema</a>
  </div>
</body>
</html>
