services:

  web:
    build: .
    entrypoint: >
      bash -c "cd /var/www/html &&
               composer install --no-dev --optimize-autoloader --no-interaction &&
               apache2-foreground"
    ports:
      - "8080:80"
      - "8081:8081"
    volumes:
      - .:/var/www/html
      - ./frontend:/var/www/html/automax
      - ./flowgate:/var/www/html/flowgate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: oficina_db
      DB_USER: automax
      DB_PASS: automax123
      FG_DB_HOST: db
      FG_DB_NAME: flowgate_db
      FG_DB_USER: flowgate
      FG_DB_PASS: flowgate123

  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: oficina_db
      MYSQL_USER: automax
      MYSQL_PASSWORD: automax123
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/Banco_de_Dados/oficina_db_mariadb.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/Banco_de_Dados/seed_funcionarios.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - ./backend/Banco_de_Dados/flowgate_init.sql:/docker-entrypoint-initdb.d/03_flowgate_user.sql
      - ./flowgate/docs/flowgate_db.sql:/docker-entrypoint-initdb.d/04_flowgate_schema.sql
      - ./backend/Banco_de_Dados/seed_cliente_teste.sql:/docker-entrypoint-initdb.d/05_seed_cliente_teste.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data: