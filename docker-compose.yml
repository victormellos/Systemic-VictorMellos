services:

  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: oficina_db
      DB_USER: automax
      DB_PASS: automax123

  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: oficina_db
      MYSQL_USER: automax
      MYSQL_PASSWORD: automax123
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/Banco_de_Dados/oficina_db_mariadb.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/Banco_de_Dados/seed_funcionarios.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data: